name: Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Build
        run: npm run build
